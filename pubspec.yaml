name: handwave_app
description: HandWave - Comunicación sin barreras para personas sordas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_database: ^11.1.0
  go_router: ^14.1.0
  provider: ^6.1.2
  speech_to_text: ^6.6.0
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  camera: ^0.11.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
name: handwave_app
description: HandWave - Comunicación sin barreras para personas con discapacidad auditiva
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Nuevas funcionalidades
  flutter_tts: ^4.0.2
  shimmer: ^3.0.0
  url_launcher: ^6.3.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_database: ^11.1.0

  # Navegación y estado
  go_router: ^14.1.0
  provider: ^6.1.2

  # Funcionalidades
  speech_to_text: ^7.0.0
  shared_preferences: ^2.2.3
  crypto: ^3.0.3

  # UI
  cupertino_icons: ^1.0.6

  # GPS
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true